services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cpq_hvac
      POSTGRES_USER: cpq
      POSTGRES_PASSWORD: cpq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpq -d cpq_hvac"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://cpq:cpq@db:5432/cpq_hvac
      APP_NAME: cpq-hvac
      APP_ENV: local
      APP_DEBUG: "true"
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      LOG_LEVEL: INFO
      OTEL_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./apps/frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
