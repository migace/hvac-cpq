name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend-typecheck:
    name: "Frontend / Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc -b
        working-directory: apps/frontend

  frontend-lint:
    name: "Frontend / Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx eslint .
        working-directory: apps/frontend

  frontend-build:
    name: "Frontend / Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vite build
        working-directory: apps/frontend

  frontend-e2e:
    name: "Frontend / E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cpq
          POSTGRES_PASSWORD: cpq
          POSTGRES_DB: cpq_hvac
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/pyproject.toml
      - run: npm ci

      # Backend setup
      - name: Install backend dependencies
        run: pip install -e ".[dev]"
        working-directory: apps/backend

      - name: Run database migrations
        run: alembic upgrade head
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql+psycopg://cpq:cpq@localhost:5432/cpq_hvac

      - name: Seed demo data
        run: python -m scripts.seed_demo_data
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql+psycopg://cpq:cpq@localhost:5432/cpq_hvac

      - name: Start backend server
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql+psycopg://cpq:cpq@localhost:5432/cpq_hvac
          APP_ENV: ci
          OTEL_ENABLED: "false"

      - name: Wait for backend to be ready
        run: timeout 30 bash -c 'until curl -sf http://localhost:8000/health > /dev/null; do sleep 1; done'

      # Playwright
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/frontend

      - name: Run E2E tests
        run: npx playwright test
        working-directory: apps/frontend
        env:
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Backend
  # ---------------------------------------------------------------------------
  backend-lint:
    name: "Backend / Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: apps/backend
      - run: ruff check .
        working-directory: apps/backend

  backend-typecheck:
    name: "Backend / Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: apps/backend
      - run: mypy app/
        working-directory: apps/backend

  backend-tests:
    name: "Backend / Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: apps/backend
      - name: Run tests
        run: pytest --tb=short -q
        working-directory: apps/backend
